<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Feed Filter</title>
  <link rel="stylesheet" href="./styles/content.css">
</head>

<body>
  <header>
    <h1><span>▌</span> Feed Filter</h1>
    <label class="master-toggle">
      <input type="checkbox" id="masterToggle" checked>
      <div class="slider"></div>
    </label>
  </header>

  <div class="section-label">Feed</div>
  <div class="options">
    <label class="option">
      <div class="option-info">
        <div class="option-name">Suggested posts</div>
        <div class="option-desc">Posts from people you don't follow</div>
      </div>
      <div class="toggle"><input type="checkbox" data-key="suggested" checked>
        <div class="slider"></div>
      </div>
    </label>
    <label class="option">
      <div class="option-info">
        <div class="option-name">Promoted posts</div>
        <div class="option-desc">Paid advertisements in feed</div>
      </div>
      <div class="toggle"><input type="checkbox" data-key="promoted" checked>
        <div class="slider"></div>
      </div>
    </label>
    <label class="option">
      <div class="option-info">
        <div class="option-name">Follow suggestions</div>
        <div class="option-desc">"Recommended for you" cards</div>
      </div>
      <div class="toggle"><input type="checkbox" data-key="followSuggestions" checked>
        <div class="slider"></div>
      </div>
    </label>
    <label class="option">
      <div class="option-info">
        <div class="option-name">Job suggestions</div>
        <div class="option-desc">"Jobs recommended for you" carousel</div>
      </div>
      <div class="toggle"><input type="checkbox" data-key="jobSuggestions" checked>
        <div class="slider"></div>
      </div>
    </label>

    <label class="option">
      <div>
        <div class="option-info">
          <div class="option-name">Keyword filter</div>
          <div class="option-desc">Filter out posts by keywords/phrases. Add a CSV list of phrases to look for.</div>
        </div>
        <div class="keyword-filter">
          <textarea class="keyword-filter-input" type="text" id="keywordFilter"
            placeholder="Enter keywords, separated by commas"></textarea>
        </div>
      </div>
    </label>


    <label class="option">
      <div class="option-info">
        <div class="option-name">Nuke entire feed 🗑️</div>
        <div class="option-desc">All posts in feed including "Start a post" component</div>
      </div>
      <div class="toggle"><input type="checkbox" id="nukeFeedToggle" checked>
        <div class="slider"></div>
      </div>
    </label>
  </div>

  <div class="divider"></div>
